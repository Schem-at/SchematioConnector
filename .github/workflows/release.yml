# Release pipeline: builds the full artifact set and publishes it.
#
# Triggered by pushing a `v*` tag (the annotated tag body becomes the release
# notes - see RELEASING.md) or manually via workflow_dispatch against an
# existing tag.
#
# Artifact set (1 Paper jar + 1 Fabric jar per supported MC version):
#   - bukkit/build/libs/SchematioConnector-Paper-<version>.jar
#   - build/libs/<version>/SchematioConnector-Fabric-mc<mc>-<version>.jar
#     for MC 1.21.8, 1.21.9, 1.21.10, 1.21.11, 26.1
#
# Adding a new MC version:
#   1. Add it to `buildableVersions` in fabric/stonecutter.gradle.kts.
#   2. Bump EXPECTED_JAR_COUNT below.
#   3. Add a "Publish Fabric mod (MC <version>) to Modrinth" step - copy an
#      existing fabric publish step and change the two version strings.
#
# Modrinth publishing is WIRED BUT INACTIVE: every publish step requires BOTH
# the `publish_modrinth` dispatch input to be true (tag pushes never set it,
# so tag-triggered releases never publish) AND the MODRINTH_TOKEN secret to be
# present. Going live = set MODRINTH_TOKEN (secret), MODRINTH_MOD_PROJECT_ID +
# MODRINTH_PLUGIN_PROJECT_ID (variables), then re-run via workflow_dispatch
# with publish_modrinth=true. See RELEASING.md "Going live".
#
# JDK note: gradle/gradle-daemon-jvm.properties pins the Gradle daemon to
# Java 25; the 1.21.x compile toolchains use Java 21. Both are provisioned,
# with 25 last so JAVA_HOME satisfies the daemon pin.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build (e.g. v1.2.0)"
        required: true
        type: string
      publish_modrinth:
        description: "Publish to Modrinth (also requires MODRINTH_TOKEN secret)"
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_TOOLCHAIN_ARGS: -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # 25 last => JAVA_HOME points at 25 (the Gradle daemon JVM pin).
          java-version: |
            21
            25

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: true
          cache-read-only: true

      - name: Determine version
        id: version
        run: |
          VERSION=$(awk -F= '/^versionMajor=/{ma=$2} /^versionMinor=/{mi=$2} /^versionPatch=/{pa=$2} END{print ma"."mi"."pa}' gradle.properties)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ "v$VERSION" != "$TAG" ]; then
            echo "::warning::Tag $TAG does not match gradle.properties version $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Run core tests
        run: ./gradlew :core:test $GRADLE_TOOLCHAIN_ARGS

      - name: Build Paper plugin
        run: ./gradlew :bukkit:build $GRADLE_TOOLCHAIN_ARGS

      - name: Build Fabric mod (all supported Minecraft versions)
        run: ./gradlew :fabric:buildAllVersions $GRADLE_TOOLCHAIN_ARGS

      - name: Stage release artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
          # 1 Paper jar + 5 Fabric jars (1.21.8, 1.21.9, 1.21.10, 1.21.11, 26.1).
          EXPECTED_JAR_COUNT: "6"
        run: |
          mkdir -p staging
          cp "bukkit/build/libs/SchematioConnector-Paper-$VERSION.jar" staging/
          cp build/libs/"$VERSION"/SchematioConnector-Fabric-mc*-"$VERSION".jar staging/
          COUNT=$(ls staging | wc -l | tr -d ' ')
          echo "Staged $COUNT artifacts:"
          ls -la staging/
          if [ "$COUNT" -ne "$EXPECTED_JAR_COUNT" ]; then
            echo "::error::Expected $EXPECTED_JAR_COUNT release jars, found $COUNT"
            exit 1
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-jars
          path: staging/*.jar
          if-no-files-found: error

  github-release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Checkout (for tag annotation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: staging

      - name: Extract release notes from tag annotation
        id: notes
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          # Annotated tag: body after the first blank line. Lightweight tag: empty.
          BODY=$(git tag -l --format='%(contents:body)' "$TAG")
          {
            echo "body<<EOF_RELEASE_NOTES"
            echo "$BODY"
            echo "EOF_RELEASE_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: SchematioConnector v${{ needs.build.outputs.version }}
          files: staging/*.jar
          body: |
            ${{ steps.notes.outputs.body }}

            ---

            ### Installation

            **Paper:** download `SchematioConnector-Paper-${{ needs.build.outputs.version }}.jar`, drop it into `plugins/`, restart the server.

            **Fabric (client or server):** download the `SchematioConnector-Fabric-mc<your MC version>-${{ needs.build.outputs.version }}.jar` matching your Minecraft version, drop it into `mods/`. Requires Fabric API and Fabric Language Kotlin; Litematica integration is optional.

  # ---------------------------------------------------------------------------
  # Modrinth publishing - WIRED BUT INACTIVE.
  # Tag-triggered runs: github.event.inputs.publish_modrinth is empty -> the
  # whole job is skipped. workflow_dispatch defaults publish_modrinth to false.
  # Every step is additionally gated on the MODRINTH_TOKEN secret existing, so
  # nothing can publish until the secret + vars are configured (RELEASING.md).
  # ---------------------------------------------------------------------------
  publish-modrinth:
    runs-on: ubuntu-latest
    needs: [build, github-release]
    if: ${{ github.event.inputs.publish_modrinth == 'true' }}
    steps:
      - name: Checkout (for changelog extraction)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-jars
          path: staging

      - name: Extract changelog from tag annotation
        id: changelog
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          BODY=$(git tag -l --format='%(contents:body)' "$TAG")
          {
            echo "body<<EOF_CHANGELOG"
            echo "$BODY"
            echo "EOF_CHANGELOG"
          } >> "$GITHUB_OUTPUT"

      - name: Publish Fabric mod (MC 1.21.8) to Modrinth
        if: ${{ github.event.inputs.publish_modrinth == 'true' && secrets.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_MOD_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: staging/SchematioConnector-Fabric-mc1.21.8-*.jar
          name: SchematioConnector ${{ needs.build.outputs.version }} (MC 1.21.8)
          version: ${{ needs.build.outputs.version }}+mc1.21.8
          version-type: release
          loaders: fabric
          game-versions: 1.21.8
          dependencies: |
            fabric-api(required)
            fabric-language-kotlin(required)
            litematica(optional)
          changelog: ${{ steps.changelog.outputs.body }}

      - name: Publish Fabric mod (MC 1.21.9) to Modrinth
        if: ${{ github.event.inputs.publish_modrinth == 'true' && secrets.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_MOD_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: staging/SchematioConnector-Fabric-mc1.21.9-*.jar
          name: SchematioConnector ${{ needs.build.outputs.version }} (MC 1.21.9)
          version: ${{ needs.build.outputs.version }}+mc1.21.9
          version-type: release
          loaders: fabric
          game-versions: 1.21.9
          dependencies: |
            fabric-api(required)
            fabric-language-kotlin(required)
            litematica(optional)
          changelog: ${{ steps.changelog.outputs.body }}

      - name: Publish Fabric mod (MC 1.21.10) to Modrinth
        if: ${{ github.event.inputs.publish_modrinth == 'true' && secrets.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_MOD_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: staging/SchematioConnector-Fabric-mc1.21.10-*.jar
          name: SchematioConnector ${{ needs.build.outputs.version }} (MC 1.21.10)
          version: ${{ needs.build.outputs.version }}+mc1.21.10
          version-type: release
          loaders: fabric
          game-versions: 1.21.10
          dependencies: |
            fabric-api(required)
            fabric-language-kotlin(required)
            litematica(optional)
          changelog: ${{ steps.changelog.outputs.body }}

      - name: Publish Fabric mod (MC 1.21.11) to Modrinth
        if: ${{ github.event.inputs.publish_modrinth == 'true' && secrets.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_MOD_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: staging/SchematioConnector-Fabric-mc1.21.11-*.jar
          name: SchematioConnector ${{ needs.build.outputs.version }} (MC 1.21.11)
          version: ${{ needs.build.outputs.version }}+mc1.21.11
          version-type: release
          loaders: fabric
          game-versions: 1.21.11
          dependencies: |
            fabric-api(required)
            fabric-language-kotlin(required)
            litematica(optional)
          changelog: ${{ steps.changelog.outputs.body }}

      - name: Publish Fabric mod (MC 26.1) to Modrinth
        if: ${{ github.event.inputs.publish_modrinth == 'true' && secrets.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_MOD_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: staging/SchematioConnector-Fabric-mc26.1-*.jar
          name: SchematioConnector ${{ needs.build.outputs.version }} (MC 26.1)
          version: ${{ needs.build.outputs.version }}+mc26.1
          version-type: release
          loaders: fabric
          game-versions: 26.1
          dependencies: |
            fabric-api(required)
            fabric-language-kotlin(required)
            litematica(optional)
          changelog: ${{ steps.changelog.outputs.body }}

      # To add a new MC version: copy a fabric step above, replace the version strings.

      - name: Publish Paper plugin to Modrinth
        if: ${{ github.event.inputs.publish_modrinth == 'true' && secrets.MODRINTH_TOKEN != '' }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ${{ vars.MODRINTH_PLUGIN_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: staging/SchematioConnector-Paper-*.jar
          name: SchematioConnector ${{ needs.build.outputs.version }} (Paper)
          version: ${{ needs.build.outputs.version }}+paper
          version-type: release
          loaders: paper
          # Supported Paper versions (bukkit_min_version = 1.21.8).
          game-versions: |
            1.21.8
            1.21.9
            1.21.10
            1.21.11
          dependencies: |
            worldedit(optional)
          changelog: ${{ steps.changelog.outputs.body }}
